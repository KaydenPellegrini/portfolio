<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-label="Escape room ops board — booking timeline">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#170026"/><stop offset="1" stop-color="#020005"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg2)"/>
  <text x="60" y="80" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff">Booking Timeline</text>
  <text x="60" y="116" font-family="Consolas, monospace" font-size="18" fill="#00ff88" letter-spacing="2">18:00 — 23:00</text>
  <g font-family="Consolas, monospace" font-size="16" fill="#c7b5df">
