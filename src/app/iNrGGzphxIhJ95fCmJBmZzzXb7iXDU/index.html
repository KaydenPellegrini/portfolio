<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Budget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .bucket { transition: all 0.3s; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-center mb-8 text-emerald-400">Kayden's Private Budget Tracker</h1>

    <!-- MONTHLY SETUP -->
    <div class="bg-zinc-900 rounded-xl p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">1. Monthly Income Setup (1 week before payday)</h2>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-zinc-400 mb-1">Expected hours this month</label>
          <input id="hours" type="number" value="180" class="w-full bg-zinc-800 rounded-lg px-4 py-3 text-lg">
        </div>
        <div>
          <button onclick="calculateIncome()" 
                  class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-lg font-medium">
            Calculate & Lock Budget
          </button>
        </div>
      </div>
      <div id="incomeSummary" class="mt-6 text-sm hidden">
        <p>Gross: <span id="gross" class="font-mono text-emerald-400"></span></p>
        <p class="text-zinc-400">Tax = 0% (company expenses) → Net = Gross</p>
        <p id="disposable" class="text-lg font-semibold"></p>
      </div>
    </div>

    <!-- LOANS / DEBTS FIRST (always subtracted) -->
    <div class="bg-zinc-900 rounded-xl p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">Active Loans / Debts (auto-subtracted first)</h2>
      <div id="loansList" class="space-y-3"></div>
      <button onclick="addLoan()" class="text-emerald-400 text-sm mt-3">+ Add new loan</button>
    </div>

    <!-- BUDGET BUCKETS -->
    <div class="bg-zinc-900 rounded-xl p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">Your Spending Buckets (after loans)</h2>
      <div id="buckets" class="grid grid-cols-2 gap-4"></div>
    </div>

    <!-- QUICK ADD EXPENSE -->
    <div class="bg-zinc-900 rounded-xl p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">Quick Add Expense (e.g. McDonald's craving)</h2>
      <div class="grid grid-cols-3 gap-4">
        <input id="amount" type="number" placeholder="R150" class="bg-zinc-800 rounded-lg px-4 py-3">
        <select id="category" class="bg-zinc-800 rounded-lg px-4 py-3">
          <option value="Fuel">Fuel / Petrol</option>
          <option value="Takeouts">Takeouts (McDonald's etc)</option>
          <option value="Groceries">Groceries</option>
          <option value="OnlinePurchases">Online Personal Purchases</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Other">Other</option>
        </select>
        <button onclick="addExpense()" class="bg-emerald-600 hover:bg-emerald-500 rounded-lg">Add Now</button>
      </div>
      <input id="note" type="text" placeholder="McDonald's burger" class="w-full mt-3 bg-zinc-800 rounded-lg px-4 py-3">
    </div>

    <!-- TRANSACTIONS -->
    <div class="bg-zinc-900 rounded-xl p-6">
      <h2 class="text-xl font-semibold mb-4">This Month's Transactions</h2>
      <div id="transactions" class="space-y-2 text-sm"></div>
    </div>
  </div>

  <script>
    // ================== DATA STORAGE ==================
    let data = {
      month: new Date().toISOString().slice(0,7),
      hours: 180,
      gross: 0,
      disposable: 0,
      loans: [],                    // {name, monthlyAmount, type}
      transactions: [],             // {date, amount, category, note}
      buckets: {                    // target % of disposable after loans
        Fuel: 15,
        Takeouts: 8,
        Groceries: 18,
        OnlinePurchases: 10,
        Entertainment: 12,
        Other: 7
      }
    };

    function save() {
      localStorage.setItem('budgetData', JSON.stringify(data));
      renderAll();
    }

    function load() {
      const saved = localStorage.getItem('budgetData');
      if (saved) data = JSON.parse(saved);
      renderAll();
    }

    // ================== INCOME CALC ==================
    function calculateIncome() {
      data.hours = parseFloat(document.getElementById('hours').value) || 180;
      data.gross = Math.round(data.hours * 110);
      // Subtract loans first
      const totalLoans = data.loans.reduce((sum, l) => sum + l.monthlyAmount, 0);
      data.disposable = data.gross - totalLoans;

      document.getElementById('incomeSummary').classList.remove('hidden');
      document.getElementById('gross').textContent = `R${data.gross.toLocaleString()}`;
      document.getElementById('disposable').innerHTML = `
        True disposable after loans: <span class="text-emerald-400 font-mono">R${data.disposable.toLocaleString()}</span>
      `;
      save();
    }

    // ================== LOANS ==================
    function addLoan() {
      const name = prompt("Loan name (e.g. 6-month loan)");
      const amount = parseFloat(prompt("Monthly debit amount (R)"));
      if (!name || !amount) return;
      data.loans.push({name, monthlyAmount: amount});
      save();
    }

    // ================== EXPENSES & BUCKETS ==================
    function addExpense() {
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;
      const note = document.getElementById('note').value || '';

      if (!amount) return alert("Enter amount");

      data.transactions.unshift({
        date: new Date().toLocaleDateString('en-ZA'),
        amount: -amount,
        category,
        note
      });

      // Auto-update bucket remaining (simple)
      save();
    }

    function renderAll() {
      // Loans
      let html = '';
      data.loans.forEach((l, i) => {
        html += `<div class="flex justify-between bg-zinc-800 p-3 rounded-lg">
          <span>${l.name}</span>
          <span class="text-red-400">-R${l.monthlyAmount}</span>
        </div>`;
      });
      document.getElementById('loansList').innerHTML = html || '<p class="text-zinc-400">No active loans yet</p>';

      // Buckets
      html = '';
      const totalSpent = data.transactions.reduce((sum, t) => sum + (t.amount || 0), 0);
      Object.keys(data.buckets).forEach(cat => {
        const target = Math.round(data.disposable * (data.buckets[cat]/100));
        const spent = data.transactions
          .filter(t => t.category === cat)
          .reduce((sum, t) => sum + Math.abs(t.amount), 0);
        const percentUsed = target ? Math.round((spent / target) * 100) : 0;

        html += `
          <div class="bucket bg-zinc-800 p-4 rounded-xl">
            <div class="flex justify-between text-sm">
              <span>${cat}</span>
              <span class="font-mono">R${spent} / R${target}</span>
            </div>
            <div class="h-2 bg-zinc-700 rounded-full mt-2 overflow-hidden">
              <div class="h-full bg-emerald-500 transition-all" style="width: ${Math.min(percentUsed,100)}%"></div>
            </div>
          </div>`;
      });
      document.getElementById('buckets').innerHTML = html;

      // Transactions
      html = '';
      data.transactions.forEach(t => {
        html += `<div class="flex justify-between py-2 border-b border-zinc-800">
          <div>
            <span class="text-emerald-400">${t.date}</span> — ${t.category}
            ${t.note ? `<br><span class="text-xs text-zinc-500">${t.note}</span>` : ''}
          </div>
          <span class="font-mono ${t.amount < 0 ? 'text-red-400' : 'text-emerald-400'}">
            R${t.amount}
          </span>
        </div>`;
      });
      document.getElementById('transactions').innerHTML = html || '<p class="text-zinc-400">No expenses yet</p>';
    }

    // Init
    load();
    // Auto-save every 5 seconds (for phone use)
    setInterval(save, 5000);
  </script>
</body>
</html>
